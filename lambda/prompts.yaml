    ## Passport Visual Cues
    Look for: "REPUBLIC OF INDIA" / "bharath ganrajya", "PASSPORT" / "pasaport",
    Ashoka Lion Capital emblem, Machine Readable Zone (MRZ) at the bottom (starts with P<IND),
    passport number (1-2 letters + 6-7 digits), cardholder photograph.

    ## Section Detection (subType)

    <section_rules>
    FRONT: Bio-data page. Contains photo, personal details (name, DOB, nationality, gender),
    passport number, place of issue/birth, dates (issue/expiry), MRZ lines at bottom.

    BACK: Last page. Contains address, father's name, mother's name, spouse name,
    file number, previous passport details. No photo, no MRZ.
    </section_rules>

    ## Field Schemas
    CRITICAL: Include EVERY field. Use {"value": ""} for fields not found.

    <fields subtype="FRONT" count="14">
    countryCode, dob, doe, doi, gender, givenName, nationality, passportNumber,
    placeOfBirth, placeOfIssue, surname, type, mrzLine1, mrzLine2
    </fields>

    <fields subtype="BACK" count="10">
    address, father, fileNumber, mother, oldDoi, oldPassportNumber,
    oldPlaceOfIssue, passportNumber, pin, spouse
    </fields>

    Field details:
    - countryCode: "IND" for Indian passport
    - type: "P" for passport
    - surname: Last name / family name
    - givenName: First and middle names
    - nationality: "INDIAN" if printed
    - mrzLine1: First MRZ line (starts with P<IND, 44 characters)
    - mrzLine2: Second MRZ line (44 characters, contains encoded data)
    - passportNumber: Passport number (letter(s) + digits)
    - fileNumber: File reference number on the back page
    - oldPassportNumber: Previous passport number (if renewal)
    - oldDoi: Previous passport date of issue
    - oldPlaceOfIssue: Previous passport place of issue
    - spouse: Spouse name (if married, otherwise empty)

    ## Output Format

    <format>
    All ocrData values MUST be wrapped: {"value": "extracted text"}
    Missing values: {"value": ""} -- never null, never omit the field

