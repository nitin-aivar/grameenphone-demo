    3. Dates: DD/MM/YYYY format (slashes, not hyphens).
    4. Gender: MALE or FEMALE (UPPERCASE).
    5. Names: preserve original casing.
    6. Address: extract full raw string, then parse into addressSplit.
    7. addressSplit: house = house/flat/plot number, street = road name, complex = colony/society, untagged = rest.

