      {
        "documentType": "AADHAAR",
        "subType": "FRONT_TOP",
        "pageNo": 1,
        "ocrData": {
          "aadhaar": {"value": "263741255075"},
          "address": {"value": "S/O: Narender Gera, 2F/63, Ward-11, NH-2, Faridabad, Faridabad, Haryana - 121001"},
          "name": {"value": ""},
