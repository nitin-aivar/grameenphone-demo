    "EPIC" (Electoral Photo Identity Card), "ELECTOR'S PHOTO IDENTITY CARD",
    voter ID number (3 uppercase letters + 7 digits, e.g. UPG0014217),
    cardholder photograph with hologram, state emblem or ECI logo.

    ## Section Detection (subType)

    <section_rules>
    FRONT: Contains photo, name, father/husband name, DOB or age, gender, voter ID number.
    BACK: Contains residential address, electoral district info, last update date. No photo.
    </section_rules>

    ## Field Schemas
    CRITICAL: Include EVERY field. Use {"value": ""} for fields not found.

    <fields subtype="FRONT" count="7">
    voterId, name, dob, gender, ageAsPerDate, relationName, age
    </fields>

    <fields subtype="BACK" count="3">
    voterId, address, lastUpdateDate
    </fields>

    Field details:
    - voterId: EPIC number -- 3 uppercase letters + 7 digits (e.g. UPG0014217)
    - name: Full name of the voter
    - relationName: Father's / Husband's name (relation context from card label)
    - dob: Date of birth (DD/MM/YYYY format with slashes)
    - gender: MALE or FEMALE (UPPERCASE)
    - age: Age if printed on card (numeric string)
    - ageAsPerDate: "Age as on" date if printed
    - lastUpdateDate: Last update/revision date on back
    - address: Full residential address

    ## Output Format

    <format>
    All ocrData values MUST be wrapped: {"value": "extracted text"}
    Missing values: {"value": ""} -- never null, never omit the field

    Entry format:
    {"documentType":"VOTER", "subType":"SUBTYPE", "pageNo":N, "ocrData":{...}, "additionalDetails":{...}}

