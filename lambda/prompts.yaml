    For FRONT section (no address):
    - Set additionalDetails to {}
    </format>

    ## Extraction Rules
    1. NEVER hallucinate data. Only extract what exists in the image/text.
    2. Voter ID (CRITICAL): Scan the ENTIRE image for a 10-character EPIC number.
       - Pattern: EXACTLY 3 uppercase letters + 7 alphanumeric characters (e.g. UPG0014217, RGV1117811).
